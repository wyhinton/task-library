name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - name: Run tests (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test
      - name: Run tests
        if: runner.os != 'Linux'
        run: npm test
